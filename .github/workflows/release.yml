name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate changelog
        id: changelog
        run: |
          # 找到上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # 第一次发版，取所有 commit
            LOGS=$(git log --pretty=format:"- %s" --no-merges -20)
          else
            LOGS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          fi
          # 写入文件，避免多行字符串转义问题
          echo "$LOGS" > /tmp/changelog.txt

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 暂时跳过签名和公证（证书私钥无法导出到 CI）
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-vite build && npx electron-builder --mac --publish always

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CHANGELOG=$(cat /tmp/changelog.txt)
          gh release edit "$TAG" --notes "$CHANGELOG"
