appId: com.swob.app
productName: Swob
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{tsconfig,tsconfig.*}.json'
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  artifactName: swob-${version}-${arch}.${ext}
publish:
  provider: github
  owner: IvyYang1999
  repo: swob
  releaseType: release
