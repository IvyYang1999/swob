name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOGS=$(git log --pretty=format:"%s" --no-merges -30)
          else
            LOGS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          fi
          # 过滤掉非用户相关的 commit
          echo "$LOGS" | grep -v -i \
            -e '^CI:' \
            -e '^ci:' \
            -e '^README' \
            -e '^docs:' \
            -e '^test:' \
            -e '^chore:' \
            -e '^Merge' \
            -e '临时' \
            -e '调试' \
            -e 'Revert' \
            -e '发版 v' \
            -e '搭建 Harness' \
            -e '更新计划文档' \
            | sed 's/^/- /' > /tmp/changelog.txt || true

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ZPTA4LP594
        run: |
          npx electron-vite build
          npx electron-builder --mac --publish always
          # 删除 blockmap 文件，减少 release 页面杂项
          rm -f dist/*.blockmap

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CHANGELOG=$(cat /tmp/changelog.txt)
          gh release edit "$TAG" --notes "$CHANGELOG"
          # 删除 release 中的 blockmap 文件
          for asset in $(gh release view "$TAG" --json assets -q '.assets[].name' | grep '\.blockmap$'); do
            gh release delete-asset "$TAG" "$asset" --yes
          done
